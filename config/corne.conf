CONFIG_BT=y

# Power management: enable deep sleep for better wireless battery life.
# Idle (screen off / lower BLE poll rate) after 30s default; deep sleep after 30 min.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Connection-stability tweaks (planned future ZMK defaults); improves BLE
# reconnect reliability after sleep.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# OLED displays (SSD1306). The Corne shield auto-enables I2C/SSD1306/LVGL when
# this is set. Left/central OLED shows battery %, active layer, and BLE/output
# status; right OLED shows a connection/status screen.
CONFIG_ZMK_DISPLAY=y

# Report each half's battery: fetch the peripheral (right) level on the central
# and proxy it to the host, so the OS shows both halves' batteries.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

